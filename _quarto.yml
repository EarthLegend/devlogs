project:
  type: website
  output-dir: _site

website:
  title: "Lgnd.ai — Devlogs"
  description: "Research notes and devlogs from LGND AI and Clay"
  site-url: "https://devlogs.lgnd.ai/"
  favicon: assets/favicon.png
  google-analytics: "G-XXXXXXXXXX"
  repo-url: https://github.com/EarthLegend/devlogs
  repo-actions: [edit, issue]

  navbar:
    left:
      - text: "Posts"
        href: index.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/EarthLegend
        aria-label: GitHub

  page-footer:
    center: "© LGND AI · Posts are [CC-BY](https://creativecommons.org/licenses/by/4.0/) · Code is [MIT](https://opensource.org/licenses/MIT)"  

  search: true

  comments: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: true
    code-copy: true
    code-tools: true
    highlight-style: github
    fig-align: center
    fig-cap-location: bottom
    number-sections: false

execute:
  freeze: auto
  cache: true

